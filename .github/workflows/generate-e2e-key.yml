name: Generate E2E SA Key
on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'GCP project ID containing e2e-test-runner SA'
        required: true
        default: 'agentbase-test-staging'

jobs:
  generate-key:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: staging
    steps:
      - name: Authenticate as e2e-runner SA directly via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: e2e-test-runner@${{ github.event.inputs.project_id }}.iam.gserviceaccount.com
          project_id: ${{ github.event.inputs.project_id }}

      - name: Enable APIs and grant roles
        run: |
          PROJECT="${{ github.event.inputs.project_id }}"
          DEPLOY_SA="firebase-deploy-staging@agentbase-staging.iam.gserviceaccount.com"

          echo "Enabling APIs..."
          gcloud services enable iam.googleapis.com --project "${PROJECT}"
          gcloud services enable cloudbilling.googleapis.com --project "${PROJECT}"
          gcloud services enable compute.googleapis.com --project "${PROJECT}"
          gcloud services enable cloudresourcemanager.googleapis.com --project "${PROJECT}"

          echo "Granting iam.serviceAccountAdmin to deploy SA..."
          gcloud projects add-iam-policy-binding "${PROJECT}" \
            --member="serviceAccount:${DEPLOY_SA}" \
            --role="roles/iam.serviceAccountAdmin" \
            --condition=None 2>&1 || true

          echo "Granting iam.serviceAccountKeyAdmin to deploy SA..."
          gcloud projects add-iam-policy-binding "${PROJECT}" \
            --member="serviceAccount:${DEPLOY_SA}" \
            --role="roles/iam.serviceAccountKeyAdmin" \
            --condition=None 2>&1 || true

          echo "Granting tokenCreator to deploy SA..."
          SA="e2e-test-runner@${PROJECT}.iam.gserviceaccount.com"
          gcloud iam service-accounts add-iam-policy-binding "$SA" \
            --member="serviceAccount:${DEPLOY_SA}" \
            --role="roles/iam.serviceAccountTokenCreator" \
            --project "${PROJECT}" 2>&1 || true

          echo "Granting projectIamAdmin to deploy SA..."
          gcloud projects add-iam-policy-binding "${PROJECT}" \
            --member="serviceAccount:${DEPLOY_SA}" \
            --role="roles/resourcemanager.projectIamAdmin" \
            --condition=None 2>&1 || true

          echo "Granting serviceUsageConsumer to deploy SA..."
          gcloud projects add-iam-policy-binding "${PROJECT}" \
            --member="serviceAccount:${DEPLOY_SA}" \
            --role="roles/serviceusage.serviceUsageAdmin" \
            --condition=None 2>&1 || true

          echo "Granting compute admin to deploy SA..."
          gcloud projects add-iam-policy-binding "${PROJECT}" \
            --member="serviceAccount:${DEPLOY_SA}" \
            --role="roles/compute.admin" \
            --condition=None 2>&1 || true

          echo "Granting firebase admin to deploy SA..."
          gcloud projects add-iam-policy-binding "${PROJECT}" \
            --member="serviceAccount:${DEPLOY_SA}" \
            --role="roles/firebase.admin" \
            --condition=None 2>&1 || true

      - name: Create e2e SA key
        id: create-key
        run: |
          gcloud iam service-accounts keys create /tmp/sa-key.json \
            --iam-account="e2e-test-runner@${{ github.event.inputs.project_id }}.iam.gserviceaccount.com"
          echo "key_path=/tmp/sa-key.json" >> "$GITHUB_OUTPUT"

      - name: Upload SA key as artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-sa-key
          path: ${{ steps.create-key.outputs.key_path }}
