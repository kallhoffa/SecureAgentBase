name: Generate E2E SA Key
on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'GCP project ID containing e2e-test-runner SA'
        required: true
        default: 'agentbase-test-staging'

jobs:
  generate-key:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: staging
    steps:
      - name: Authenticate as e2e-runner SA directly via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: e2e-test-runner@${{ github.event.inputs.project_id }}.iam.gserviceaccount.com
          project_id: ${{ github.event.inputs.project_id }}

      - name: Enable IAM API in e2e project
        run: |
          gcloud services enable iam.googleapis.com --project "${{ github.event.inputs.project_id }}"

      - name: Create e2e SA key
        id: create-key
        run: |
          gcloud iam service-accounts keys create /tmp/sa-key.json \
            --iam-account="e2e-test-runner@${{ github.event.inputs.project_id }}.iam.gserviceaccount.com"
          echo "key_path=/tmp/sa-key.json" >> "$GITHUB_OUTPUT"
          echo "SA key created successfully"

      - name: Upload SA key as artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-sa-key
          path: ${{ steps.create-key.outputs.key_path }}
