name: Deploy to Production

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate to GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_PRODUCTION }}

      - name: Build
        run: npm run build
        env:
          VITE_APP_ENV: production
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY_PRODUCTION }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN_PRODUCTION }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID_PRODUCTION }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET_PRODUCTION }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID_PRODUCTION }}
          VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_PRODUCTION }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.FIREBASE_MEASUREMENT_ID_PRODUCTION }}
          VITE_APP_VERSION: ${{ github.ref_name }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting,firestore

      - name: Run Smoke Tests on Production
        run: |
          echo "Waiting for production to deploy..."
          sleep 30
          npx playwright test e2e/smoke.spec.js --retries=2
        env:
          TEST_URL: https://${{ vars.PRODUCTION_URL }}

      - name: Run Full E2E Tests on Production
        run: npx playwright test e2e --retries=2
        env:
          TEST_URL: https://${{ vars.PRODUCTION_URL }}

      - name: Upload logs on failure
        if: failure()
        run: |
          echo "## Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for errors." >> $GITHUB_STEP_SUMMARY
