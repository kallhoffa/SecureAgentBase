name: Deploy to Staging

on:
  push:
    branches:
      - main

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: build-cli
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Use default hosting site for staging
        run: jq 'del(.hosting.site)' firebase.json > firebase.tmp.json && mv firebase.tmp.json firebase.json

      - name: Authenticate to GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_STAGING }}

      - name: Build
        run: npm run build
        env:
          VITE_APP_ENV: staging
          VITE_FIREBASE_API_KEY_STAGING: ${{ vars.FIREBASE_API_KEY_STAGING }}
          VITE_FIREBASE_AUTH_DOMAIN_STAGING: ${{ vars.FIREBASE_AUTH_DOMAIN_STAGING }}
          VITE_FIREBASE_PROJECT_ID_STAGING: ${{ vars.FIREBASE_PROJECT_ID_STAGING }}
          VITE_FIREBASE_STORAGE_BUCKET_STAGING: ${{ vars.FIREBASE_STORAGE_BUCKET_STAGING }}
          VITE_FIREBASE_MESSAGING_SENDER_ID_STAGING: ${{ vars.FIREBASE_MESSAGING_SENDER_ID_STAGING }}
          VITE_FIREBASE_APP_ID_STAGING: ${{ vars.FIREBASE_APP_ID_STAGING }}
          VITE_FIREBASE_MEASUREMENT_ID_STAGING: ${{ vars.FIREBASE_MEASUREMENT_ID_STAGING }}
          VITE_FIREBASE_APP_CHECK_SITE_KEY_STAGING: ${{ vars.FIREBASE_APP_CHECK_SITE_KEY_STAGING }}
          VITE_GCP_CLIENT_ID: ${{ vars.GCP_CLIENT_ID_STAGING }}
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_APP_MODE: ${{ vars.VITE_APP_MODE }}
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Deploy to Firebase Staging
        run: npx firebase-tools deploy --only hosting,firestore --project ${{ vars.FIREBASE_PROJECT_ID_STAGING }}

      - name: Wait for Staging Deploy
        run: |
          URL="https://${{ vars.FIREBASE_PROJECT_ID_STAGING }}.web.app"
          echo "Waiting for $URL to be reachable..."
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null "$URL" 2>/dev/null; then
              echo "Site is up!"
              exit 0
            fi
            echo "Waiting... attempt $i"
            sleep 5
          done
          echo "Site did not become reachable within 150 seconds"
          exit 1

      - name: Run Smoke Tests on Staging
        run: npx playwright test e2e/smoke.spec.js --retries=2
        env:
          TEST_URL: https://${{ vars.FIREBASE_PROJECT_ID_STAGING }}.web.app

      - name: Enable Firebase Auth and create test user
        run: |
          TOKEN=$(gcloud auth print-access-token 2>/dev/null)
          PROJECT=${{ vars.FIREBASE_PROJECT_ID_STAGING }}
          EMAIL="e2e@${PROJECT}.iam.gserviceaccount.com"
          PASSWORD="${{ secrets.E2E_TEST_PASSWORD }}"

          echo "=== Enabling email/password auth for ${PROJECT} ==="
          RESP=$(curl -s -X PATCH \
            "https://identitytoolkit.googleapis.com/v2/projects/${PROJECT}/config?updateMask=signIn.email.enabled,signIn.email.passwordRequired" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"signIn":{"email":{"enabled":true,"passwordRequired":true}}}')
          echo "Enable auth response: ${RESP}"

          echo "=== Creating test user via public signUp API ==="
          RESP=$(curl -s -X POST \
            "https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${{ vars.FIREBASE_API_KEY_STAGING }}" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"${EMAIL}\",\"password\":\"${PASSWORD}\",\"returnSecureToken\":true}")
          echo "Create user response: ${RESP}"

      - name: Generate e2e GCP token via impersonation
        id: gen-e2e-token
        run: |
          if [ -n "${{ vars.E2E_GCP_PROJECT_ID }}" ]; then
            TOKEN=$(gcloud auth print-access-token \
              --impersonate-service-account="e2e-test-runner@${{ vars.E2E_GCP_PROJECT_ID }}.iam.gserviceaccount.com" 2>/dev/null || \
              gcloud auth print-access-token 2>/dev/null || echo "")
            echo "token=$TOKEN" >> $GITHUB_OUTPUT
          else
            echo "token=" >> $GITHUB_OUTPUT
          fi

      - name: Run Full E2E Tests on Staging
        run: |
          npx playwright test --retries=2
        env:
          TEST_URL: https://${{ vars.FIREBASE_PROJECT_ID_STAGING }}.web.app
          E2E_GCP_TOKEN: ${{ steps.gen-e2e-token.outputs.token }}
          E2E_GCP_PROJECT_ID: ${{ vars.E2E_GCP_PROJECT_ID }}
          E2E_FULL: ${{ vars.E2E_FULL }}
          E2E_FIREBASE_API_KEY: ${{ vars.FIREBASE_API_KEY_STAGING }}
          E2E_TEST_EMAIL: e2e@agentbase-staging.iam.gserviceaccount.com
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_SA_KEY: ${{ secrets.E2E_SA_KEY }}
          E2E_GITHUB_PAT: ${{ secrets.E2E_GITHUB_PAT }}
          E2E_DISCORD_TOKEN: ${{ secrets.E2E_DISCORD_BOT_TOKEN }}
          E2E_DISCORD_BOT_ADDED: 'true'
          E2E_BILLING_ENABLED: 'true'
          E2E_APP_MODE: 'true'
          E2E_PROJECT_NAME: 'agentbase-testing'
          E2E_GITHUB_OWNER: 'kallhoffa'
          E2E_FIREBASE_STAGING_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID_STAGING }}
          E2E_FIREBASE_PRODUCTION_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID_PRODUCTION }}

      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: secureagentbase-cli

      - name: Run CLI E2E Tests
        run: node tests/e2e/cli.spec.mjs
        env:
          CLI_PACKAGE: ${{ github.workspace }}/secureagentbase-0.1.0.tgz
          GCP_PROJECT_ID: ${{ vars.E2E_GCP_PROJECT_ID }}
          SKIP_CLEANUP: ${{ vars.E2E_FULL != 'true' && 'true' || '' }}

      - name: Upload logs on failure
        if: failure()
        run: |
          echo "## Staging Deployment or Tests Failed" >> $GITHUB_STEP_SUMMARY

  build-cli:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI dependencies
        run: cd cli && npm ci

      - name: Build CLI
        run: cd cli && npm run build

      - name: Check TypeScript
        run: cd cli && npx tsc --noEmit

      - name: Package CLI
        run: cd cli && npm pack

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: secureagentbase-cli
          path: cli/secureagentbase-*.tgz
