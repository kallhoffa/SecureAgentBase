name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate to GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_STAGING }}

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY_STAGING }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN_STAGING }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID_STAGING }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET_STAGING }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID_STAGING }}
          VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_STAGING }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.FIREBASE_MEASUREMENT_ID_STAGING }}
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Deploy to Firebase Staging
        run: npx firebase-tools deploy --only hosting,firestore -P staging

      - name: Run Smoke Tests on Staging
        run: |
          echo "Waiting for staging to deploy..."
          sleep 30
          npx playwright test e2e/smoke.spec.js --retries=2
        env:
          TEST_URL: https://${{ vars.FIREBASE_PROJECT_ID_STAGING }}.web.app

      - name: Run Full E2E Tests on Staging
        run: |
          npx playwright test e2e --retries=2
        env:
          TEST_URL: https://${{ vars.FIREBASE_PROJECT_ID_STAGING }}.web.app

      - name: Upload logs on failure
        if: failure()
        run: |
          echo "## Staging Deployment or Tests Failed" >> $GITHUB_STEP_SUMMARY
